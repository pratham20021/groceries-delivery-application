apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:latest
          args: ["agent", "-server", "-ui", "-bootstrap-expect=1", "-client=0.0.0.0"]
          env:
            - name: CONSUL_BIND_INTERFACE
              value: eth0
          ports:
            - containerPort: 8500
            - containerPort: 8600
              protocol: UDP
          readinessProbe:
            exec:
              command: ["consul", "members"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: revcart
spec:
  selector:
    app: consul
  ports:
    - name: http
      port: 8500
      targetPort: 8500
    - name: dns
      port: 8600
      targetPort: 8600
      protocol: UDP
