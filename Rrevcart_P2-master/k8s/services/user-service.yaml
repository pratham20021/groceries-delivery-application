apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: <YOUR_REGISTRY>/revcart/user-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: revcart-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/revcart_users?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: revcart
spec:
  selector:
    app: user-service
  ports:
    - port: 8082
      targetPort: 8082
