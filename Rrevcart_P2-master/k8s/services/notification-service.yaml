apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: <YOUR_REGISTRY>/revcart/notification-service:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: revcart-config
          env:
            - name: SPRING_DATA_MONGODB_DATABASE
              value: notification_db
            - name: SPRING_DATA_MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: mongo-root-password
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: mail-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: mail-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: revcart
spec:
  selector:
    app: notification-service
  ports:
    - port: 8087
      targetPort: 8087
