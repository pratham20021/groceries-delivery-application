apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: <YOUR_REGISTRY>/revcart/cart-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: revcart-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: revcart
spec:
  selector:
    app: cart-service
  ports:
    - port: 8084
      targetPort: 8084
