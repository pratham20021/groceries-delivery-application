apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: <YOUR_REGISTRY>/revcart/delivery-service:latest
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: revcart-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/revcart_delivery?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: db-password
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: mail-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: revcart-secrets
                  key: mail-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: revcart
spec:
  selector:
    app: delivery-service
  ports:
    - port: 8088
      targetPort: 8088
