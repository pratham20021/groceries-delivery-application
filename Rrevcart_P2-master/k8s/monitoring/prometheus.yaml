apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: revcart
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8080']
      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service:8081']
      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['user-service:8082']
      - job_name: 'product-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['product-service:8083']
      - job_name: 'cart-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['cart-service:8084']
      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service:8085']
      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service:8086']
      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service:8087']
      - job_name: 'delivery-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['delivery-service:8088']
      - job_name: 'analytics-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['analytics-service:8089']
      - job_name: 'admin-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['admin-service:8090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: revcart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.retention.time=7d'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: revcart
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
