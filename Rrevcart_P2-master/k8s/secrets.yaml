metadata:
  name: revcart-secrets
  namespace: revcart
type: Opaque
data:
  # base64-encoded values — replace with your own
  db-password: WW91clN0cm9uZ1Bhc3N3b3JkMTIzIQ==       # YourStrongPassword123!
  mail-username: eW91ci1lbWFpbEBnbWFpbC5jb20=           # your-email@gmail.com
  mail-password: eW91ci1nbWFpbC1hcHAtcGFzc3dvcmQ=       # your-gmail-app-password
  google-client-id: eW91ci1nb29nbGUtY2xpZW50LWlk         # your-google-client-id
  google-client-secret: eW91ci1nb29nbGUtY2xpZW50LXNlY3JldA==  # your-google-client-secret
  mongo-root-username: YWRtaW4=                          # admin
  mongo-root-password: YWRtaW4=                          # admin
