version: '3.8'

services:
  consul:
    image: hashicorp/consul:latest
    container_name: revcart-consul-prod
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  mysql:
    image: mysql:8.0
    container_name: revcart-mysql-prod
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: revcart
    volumes:
      - mysql-prod-data:/var/lib/mysql
      - ./docker/mysql/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: revcart-redis-prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  mongodb:
    image: mongo:7
    container_name: revcart-mongodb-prod
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: revcart
    volumes:
      - mongodb-prod-data:/data/db
      - ./docker/mongodb/init-db.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  api-gateway:
    build:
      context: ./microservices/api-gateway
      dockerfile: Dockerfile
    container_name: revcart-api-gateway-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      consul:
        condition: service_healthy
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  auth-service:
    build:
      context: ./microservices/auth-service
      dockerfile: Dockerfile
    container_name: revcart-auth-service-prod
    ports:
      - "8081:8081"
    environment:
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ./revcart-frontend
      dockerfile: Dockerfile
    container_name: revcart-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: always
    networks:
      - revcart-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  revcart-network:
    driver: bridge

volumes:
  mysql-prod-data:
  mongodb-prod-data:
  redis-prod-data:
