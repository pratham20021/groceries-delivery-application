version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  consul:
    image: hashicorp/consul:1.17
    container_name: revcart-consul
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revcart-network

  mysql:
    image: mysql:8.0
    container_name: revcart-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: revcart
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revcart-network

  redis:
    image: redis:7-alpine
    container_name: revcart-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revcart-network

  mongodb:
    image: mongo:7
    container_name: revcart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: revcart
    volumes:
      - mongodb-data:/data/db
      - ./docker/mongodb/init-db.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revcart-network

  # ─── Microservices ────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./microservices
      dockerfile: api-gateway/Dockerfile
    container_name: revcart-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=api-gateway
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  auth-service:
    build:
      context: ./microservices
      dockerfile: auth-service/Dockerfile
    container_name: revcart-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=auth-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  user-service:
    build:
      context: ./microservices
      dockerfile: user-service/Dockerfile
    container_name: revcart-user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=user-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  product-service:
    build:
      context: ./microservices
      dockerfile: product-service/Dockerfile
    container_name: revcart-product-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_products?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=product-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  cart-service:
    build:
      context: ./microservices
      dockerfile: cart-service/Dockerfile
    container_name: revcart-cart-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=cart-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  order-service:
    build:
      context: ./microservices
      dockerfile: order-service/Dockerfile
    container_name: revcart-order-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=order-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  payment-service:
    build:
      context: ./microservices
      dockerfile: payment-service/Dockerfile
    container_name: revcart-payment-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_payments?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=payment-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  notification-service:
    build:
      context: ./microservices
      dockerfile: notification-service/Dockerfile
    container_name: revcart-notification-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=notification_db
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=notification-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - WEBSOCKET_ALLOWED_ORIGINS=http://localhost:4200
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  delivery-service:
    build:
      context: ./microservices
      dockerfile: delivery-service/Dockerfile
    container_name: revcart-delivery-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_delivery?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=delivery-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  analytics-service:
    build:
      context: ./microservices
      dockerfile: analytics-service/Dockerfile
    container_name: revcart-analytics-service
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=analytics_db
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=analytics-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  admin-service:
    build:
      context: ./microservices
      dockerfile: admin-service/Dockerfile
    container_name: revcart-admin-service
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revcart_admin?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_CLOUD_CONSUL_HOST=consul
      - SPRING_CLOUD_CONSUL_PORT=8500
      - SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME=admin-service
      - SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS=true
      - PRODUCT_SERVICE_HOST=product-service:8083
      - ORDER_SERVICE_HOST=order-service:8085
      - USER_SERVICE_HOST=user-service:8082
    depends_on:
      consul:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - revcart-network

  frontend:
    build:
      context: ./revcart-frontend
      dockerfile: Dockerfile
    container_name: revcart-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: on-failure
    networks:
      - revcart-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: revcart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - revcart-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: revcart-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - revcart-network

networks:
  revcart-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
  redis-data:
  prometheus-data:
  grafana-data:
