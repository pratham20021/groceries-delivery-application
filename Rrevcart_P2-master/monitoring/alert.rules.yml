groups:

  - name: revcart.services
    rules:

      # Service is down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      # High HTTP error rate (5xx > 5%)
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[2m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[2m])) by (job)
          > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has more than 5% error rate for 2 minutes."

      # P99 latency > 2 seconds
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket[2m])) by (le, job)
          ) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P99 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} P99 latency is above 2s."

      # JVM Heap > 85%
      - alert: HighJvmHeap
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap on {{ $labels.job }}"
          description: "{{ $labels.job }} JVM heap usage is above 85%."

  - name: revcart.jenkins
    rules:

      # Jenkins itself is down
      - alert: JenkinsDown
        expr: up{job="jenkins"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Jenkins is DOWN"
          description: "Jenkins has been unreachable for more than 1 minute."

      # Jenkins build failure rate > 20%
      - alert: JenkinsHighFailureRate
        expr: |
          rate(jenkins_builds_failed_build_count_total[10m])
          /
          rate(jenkins_builds_total_build_count_total[10m])
          > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Jenkins high build failure rate"
          description: "More than 20% of Jenkins builds are failing."
